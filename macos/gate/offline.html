<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BuhChat — нет соединения</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f7;
      color: #1d1d1f;
    }
    .card {
      width: 100%;
      max-width: 420px;
      padding: 32px;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,.08);
      text-align: center;
    }
    h1 { font-size: 22px; font-weight: 600; margin: 0 0 10px; }
    p { font-size: 14px; color: #6e6e73; margin: 0 0 18px; line-height: 1.5; }
    button {
      padding: 12px 20px;
      font-size: 15px;
      font-weight: 500;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background: #0071e3;
      color: #fff;
      width: 100%;
    }
    button:hover { background: #0077ed; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="card">
    <h1>BuhChat</h1>
    <p>Не удалось подключиться к серверу. Проверьте интернет или попробуйте позже.</p>
    <button id="retry" type="button">Повторить</button>
  </div>

  <script>
    const btn = document.getElementById('retry');
    btn.addEventListener('click', async () => {
      btn.disabled = true;
      try {
        if (window.electronAPI && typeof window.electronAPI.reloadApp === 'function') {
          await window.electronAPI.reloadApp();
        } else {
          // Fallback: try to reload this page.
          location.reload();
        }
      } finally {
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
