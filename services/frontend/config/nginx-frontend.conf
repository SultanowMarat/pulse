# Фронтенд (SPA): раздача статики, fallback на index.html для client-side routing
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Service Worker и manifest не должны кэшироваться надолго, иначе клиенты/PWA
    # могут "залипнуть" на старой версии приложения.
    location = /sw.js {
        expires -1;
        add_header Cache-Control "no-cache";
    }

    location = /manifest.webmanifest {
        expires -1;
        add_header Cache-Control "no-cache";
    }

    # Хэшированные ассеты можно кэшировать агрессивно.
    location ^~ /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Остальная статика (иконки/картинки/шрифты) тоже может кэшироваться.
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
