# pulse:    Docker Compose (, Redis, Auth, API + SPA).
# : HTTP 80. : ./data/
#      : services/<>/logs/app.log ( nginx   services/nginx/logs/)
#
# :  docker compose up -d --build   ( make up)
# :  docker compose down
#   :  docker compose logs -f

services:
  postgres:
    image: postgres:16-alpine
    container_name: pulse-db
    command: ["postgres", "-c", "max_connections=250"]
    env_file:
      - ./services/infra/postgres.env
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pulse"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: pulse-redis
    command: redis-server /etc/redis/redis.conf
    volumes:
      - ./services/infra/redis.conf:/etc/redis/redis.conf
      - ./data/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  auth:
    build:
      context: .
      dockerfile: services/auth/Dockerfile
      platforms: [linux/amd64]
    container_name: pulse-auth
    environment:
      SERVER_ADDR: ":8081"
      DATABASE_URL: "postgres://pulse:pulse_secret@postgres:5432/pulse?sslmode=disable"
      REDIS_URL: "redis://redis:6379"
      CORS_ALLOWED_ORIGINS: "${CORS_ALLOWED_ORIGINS:-*}"
      DEBUG: "${DEBUG:-}"
    volumes:
      - ./services/auth/logs:/var/log/pulse
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:8081/health"]
      interval: 5s
      timeout: 3s
      retries: 5
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  push:
    build:
      context: .
      dockerfile: services/push/Dockerfile
      platforms: [linux/amd64]
    container_name: pulse-push
    environment:
      SERVER_ADDR: ":8082"
      REDIS_URL: "redis://redis:6379"
      VAPID_PUBLIC_KEY: "${VAPID_PUBLIC_KEY:-}"
      VAPID_PRIVATE_KEY: "${VAPID_PRIVATE_KEY:-}"
      VAPID_KEYS_FILE: "/app/config/vapid.json"
      CHOWN_DIRS: "/app/config"
    volumes:
      - ./data/push:/app/config
      - ./services/push/logs:/var/log/pulse
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:8082/health"]
      interval: 10s
      timeout: 3s
      retries: 3
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  files:
    build:
      context: .
      dockerfile: services/files/Dockerfile
      platforms: [linux/amd64]
    container_name: pulse-files
    environment:
      SERVER_ADDR: ":8083"
      UPLOAD_DIR: "/app/uploads"
      MAX_UPLOAD_SIZE_MB: "20"
    volumes:
      - ./data/uploads:/app/uploads
      - ./services/files/logs:/var/log/pulse
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:8083/health"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  audio:
    build:
      context: .
      dockerfile: services/audio/Dockerfile
      platforms: [linux/amd64]
    container_name: pulse-audio
    environment:
      SERVER_ADDR: ":8084"
      UPLOAD_DIR: "/app/uploads"
      MAX_UPLOAD_SIZE_MB: "25"
      CHOWN_DIRS: "/app/uploads"
    volumes:
      - ./data/audio:/app/uploads
      - ./services/audio/logs:/var/log/pulse
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:8084/health"]
      interval: 10s
      timeout: 3s
      retries: 3
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: services/frontend/Dockerfile
      platforms: [linux/amd64]
    container_name: pulse-frontend
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
      platforms: [linux/amd64]
    container_name: pulse-api
    environment:
      SERVER_ADDR: ":8080"
      DATABASE_URL: "postgres://pulse:pulse_secret@postgres:5432/pulse?sslmode=disable"
      REDIS_URL: "redis://redis:6379"
      AUTH_SERVICE_URL: "http://auth:8081"
      PUSH_SERVICE_URL: "http://push:8082"
      PUSH_VAPID_PUBLIC_KEY: "${VAPID_PUBLIC_KEY:-}"
      VAPID_KEYS_FILE: "/app/vapid/vapid.json"
      CHOWN_DIRS: "/app/vapid"
      BACKUP_AUDIO_DIR: "/app/audio_uploads"
      FILE_SERVICE_URL: "http://files:8083"
      AUDIO_SERVICE_URL: "http://audio:8084"
      CORS_ALLOWED_ORIGINS: "${CORS_ALLOWED_ORIGINS:-*}"
    volumes:
      - ./data/uploads:/app/uploads
      - ./data/audio:/app/audio_uploads
      - ./data/push:/app/vapid
      - ./services/api/logs:/var/log/pulse
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 90s
    depends_on:
      postgres:
        condition: service_healthy
      push:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    build:
      context: .
      dockerfile: services/nginx/Dockerfile
      platforms: [linux/amd64]
    container_name: pulse-nginx
    restart: unless-stopped
    #  80    ( ),   frontend/api/files/audio
    ports:
      - "0.0.0.0:80:80"
    volumes:
      - ./services/nginx/config/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./services/nginx/logs:/var/log/nginx
      - ./data/desktop-updates:/var/www/desktop-updates:ro
    depends_on:
      - frontend
      - api
